<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Pages</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="evalbar" aria-label="Evaluation bar">
        <div id="eval-bar" class="eval-bar"></div>
      </aside>
      <main class="board-area">
        <div class="board-wrapper">
          <div id="board" class="board" role="grid" aria-label="Chess board"></div>
        </div>
        <div class="controls" role="region" aria-label="Game controls">
          <div class="control-row">
            <label class="control-item">
              Mode
              <select id="mode-select">
                <option value="pass-and-play">Pass &amp; Play</option>
                <option value="singleplayer">Singleplayer</option>
              </select>
            </label>
            <label class="control-item">
              Difficulty
              <select id="difficulty-select"></select>
            </label>
            <label class="control-item">
              AI Side
              <select id="ai-side-select"></select>
            </label>
            <label class="control-item">
              Theme
              <select id="theme-select"></select>
            </label>
          </div>
          <div class="control-row">
            <button id="resign-button" type="button">Resign</button>
            <button id="reset-button" type="button">Reset</button>
            <button id="return-button" type="button">Return to current</button>
          </div>
          <div id="status-text" class="status-text" aria-live="polite"></div>
        </div>
      </main>
      <aside class="history" aria-label="Move history">
        <div class="history-header">
          <h2>Moves</h2>
        </div>
        <div id="history-list" class="history-list" role="list"></div>
      </aside>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
